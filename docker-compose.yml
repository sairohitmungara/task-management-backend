services:
  fastapi:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app   # ✅ THIS ENABLES AUTO RELOAD
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  celery_worker:
    build: .
    container_name: celery_worker
    volumes:
      - .:/app   # optional but good
    command: celery -A app.core.celery_worker worker --loglevel=info
    depends_on:
      - redis